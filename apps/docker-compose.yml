services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smarthome-postgres
    environment:
      - POSTGRES_DB=smarthome
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./smart_home/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # PostgreSQL for Device Service
  postgres-devices:
    image: postgres:16-alpine
    container_name: smarthome-postgres-devices
    environment:
      - POSTGRES_DB=smarthome_devices
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_devices_data:/var/lib/postgresql/data
      - ./device-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # PostgreSQL for Telemetry Service
  postgres-telemetry:
    image: postgres:16-alpine
    container_name: smarthome-postgres-telemetry
    environment:
      - POSTGRES_DB=smarthome_telemetry
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_telemetry_data:/var/lib/postgresql/data
      - ./telemetry-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # PostgreSQL for User Service
  postgres-users:
    image: postgres:16-alpine
    container_name: smarthome-postgres-users
    environment:
      - POSTGRES_DB=smarthome_users
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
      - ./user-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # PostgreSQL for Billing Service
  postgres-billing:
    image: postgres:16-alpine
    container_name: smarthome-postgres-billing
    environment:
      - POSTGRES_DB=smarthome_billing
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_billing_data:/var/lib/postgresql/data
      - ./billing-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # PostgreSQL for Automation Service
  postgres-automation:
    image: postgres:16-alpine
    container_name: smarthome-postgres-automation
    environment:
      - POSTGRES_DB=smarthome_automation
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_automation_data:/var/lib/postgresql/data
      - ./automation-service/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smarthome-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - smarthome-network

  # Apache Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: smarthome-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - smarthome-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: smarthome-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://smarthome-kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # InfluxDB for Time Series Data
  influxdb:
    image: influxdb:2.7-alpine
    container_name: smarthome-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=smarthome
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=smarthome-super-secret-auth-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smarthome-network

  # Temperature API (existing)
  temperature-api:
    build:
      context: ./temperature-api
      dockerfile: Dockerfile
    container_name: temperature-api
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - smarthome-network

  # Device Management Service (NEW)
  device-service:
    build:
      context: ./device-service
      dockerfile: Dockerfile
    container_name: device-service
    environment:
      - DATABASE_HOST=postgres-devices
      - DATABASE_PORT=5432
      - DATABASE_NAME=smarthome_devices
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - KAFKA_BROKERS=smarthome-kafka:9092
    depends_on:
      postgres-devices:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - smarthome-network

  # Telemetry Service (NEW)
  telemetry-service:
    build:
      context: ./telemetry-service
      dockerfile: Dockerfile
    container_name: telemetry-service
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-telemetry:5432/smarthome_telemetry
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=smarthome-super-secret-auth-token
      - INFLUXDB_ORG=smarthome
      - INFLUXDB_BUCKET=telemetry
      - KAFKA_BROKERS=smarthome-kafka:9092
      - ENABLE_KAFKA=true
      - REDIS_URL=redis://redis:6379/0
      - TEMPERATURE_API_URL=http://temperature-api:8081
      - DEVICE_SERVICE_URL=http://device-service:8082
    depends_on:
      postgres-telemetry:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      temperature-api:
        condition: service_started
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - smarthome-network

  # User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres-users:5432/smarthome_users?sslmode=disable
    depends_on:
      postgres-users:
        condition: service_healthy
    ports:
      - "8084:8084"
    restart: unless-stopped
    networks:
      - smarthome-network

  # Billing Service
  billing-service:
    build:
      context: ./billing-service
      dockerfile: Dockerfile
    container_name: billing-service
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres-billing:5432/smarthome_billing?sslmode=disable
    depends_on:
      postgres-billing:
        condition: service_healthy
    ports:
      - "8085:8085"
    restart: unless-stopped
    networks:
      - smarthome-network

  # Automation Service
  automation-service:
    build:
      context: ./automation-service
      dockerfile: Dockerfile
    container_name: automation-service
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres-automation:5432/smarthome_automation?sslmode=disable
      - PORT=:8087
    depends_on:
      postgres-automation:
        condition: service_healthy
    ports:
      - "8087:8087"
    restart: unless-stopped
    networks:
      - smarthome-network

  # Notification Service (NEW - Events to Push Notifications)
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      - KAFKA_BROKERS=smarthome-kafka:9092
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080,http://localhost:8000
      - LOG_LEVEL=info
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8088:8086"  # Notification Service on port 8088 (8086 used by InfluxDB)
    restart: unless-stopped
    networks:
      - smarthome-network

  # API Gateway (NEW - Phase 1: Transparent proxy to Smart Home App)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      - SMART_HOME_URL=http://smarthome-app:8080
      - DEVICE_SERVICE_URL=http://device-service:8082
      - TELEMETRY_SERVICE_URL=http://telemetry-service:8083
      - USER_SERVICE_URL=http://user-service:8084
      - BILLING_SERVICE_URL=http://billing-service:8085
      - AUTOMATION_SERVICE_URL=http://automation-service:8087
      - NOTIFICATION_SERVICE_URL=http://notification-service:8086
    depends_on:
      - app
    ports:
      - "8000:8000"  # API Gateway on port 8000
    restart: unless-stopped
    networks:
      - smarthome-network

  # Smart Home App (updated dependencies) 
  app:
    build:
      context: ./smart_home
      dockerfile: Dockerfile
    container_name: smarthome-app
    depends_on:
      postgres:
        condition: service_healthy
      temperature-api:
        condition: service_started
      device-service:
        condition: service_started
      telemetry-service:
        condition: service_started
      user-service:
        condition: service_started
      billing-service:
        condition: service_started
      automation-service:
        condition: service_started
      kafka:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/smarthome
      - TEMPERATURE_API_URL=http://temperature-api:8081
      - DEVICE_SERVICE_URL=http://device-service:8082
      - TELEMETRY_SERVICE_URL=http://telemetry-service:8083
      - USER_SERVICE_URL=http://user-service:8084
      - BILLING_SERVICE_URL=http://billing-service:8085
      - AUTOMATION_SERVICE_URL=http://automation-service:8087
      - KAFKA_BROKERS=smarthome-kafka:9092
    ports:
      - "8080:8080"  # Smart Home App remains on 8080 (internal access)
    restart: unless-stopped
    networks:
      - smarthome-network

volumes:
  postgres_data:
  postgres_devices_data:
  postgres_telemetry_data:
  postgres_users_data:
  postgres_billing_data:
  postgres_automation_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  influxdb_data:
  influxdb_config:

networks:
  smarthome-network:
    driver: bridge